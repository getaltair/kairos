name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        env:
            GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21
            - uses: gradle/actions/setup-gradle@v4
              with:
                  cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
            - name: Write google-services.json
              if: env.GOOGLE_SERVICES_JSON != ''
              run: |
                  echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
                  if ! python3 -m json.tool app/google-services.json > /dev/null 2>&1; then
                      echo "::error::GOOGLE_SERVICES_JSON secret is not valid JSON"
                      exit 1
                  fi
            - name: Notice - no google-services.json
              if: env.GOOGLE_SERVICES_JSON == ''
              run: echo "::notice::GOOGLE_SERVICES_JSON secret not set. Building without Firebase services."
            - name: Run Spotless check
              run: ./gradlew spotlessCheck
            - name: Run detekt
              run: ./gradlew detekt

    test:
        name: Unit Tests
        runs-on: ubuntu-latest
        needs: lint
        env:
            GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21
            - uses: gradle/actions/setup-gradle@v4
              with:
                  cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
            - name: Write google-services.json
              if: env.GOOGLE_SERVICES_JSON != ''
              run: |
                  echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
                  if ! python3 -m json.tool app/google-services.json > /dev/null 2>&1; then
                      echo "::error::GOOGLE_SERVICES_JSON secret is not valid JSON"
                      exit 1
                  fi
            - name: Notice - no google-services.json
              if: env.GOOGLE_SERVICES_JSON == ''
              run: echo "::notice::GOOGLE_SERVICES_JSON secret not set. Building without Firebase services."
            - name: Run unit tests
              run: ./gradlew test
            - name: Upload test reports
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-reports
                  path: "**/build/reports/tests/"
                  retention-days: 7

    build:
        name: Build (Debug)
        runs-on: ubuntu-latest
        needs: test
        env:
            GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21
            - uses: gradle/actions/setup-gradle@v4
              with:
                  cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
            - name: Write google-services.json
              if: env.GOOGLE_SERVICES_JSON != ''
              run: |
                  echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
                  if ! python3 -m json.tool app/google-services.json > /dev/null 2>&1; then
                      echo "::error::GOOGLE_SERVICES_JSON secret is not valid JSON"
                      exit 1
                  fi
            - name: Notice - no google-services.json
              if: env.GOOGLE_SERVICES_JSON == ''
              run: echo "::notice::GOOGLE_SERVICES_JSON secret not set. Building without Firebase services."
            - name: Build phone app (debug)
              run: ./gradlew :app:assembleDebug
            - name: Build Wear app (debug)
              run: ./gradlew :wear:assembleDebug
            - name: Build dashboard uber JAR
              run: ./gradlew :dashboard:packageUberJarForCurrentOS
            - name: Upload debug APKs
              uses: actions/upload-artifact@v4
              with:
                  name: debug-apks
                  path: |
                      app/build/outputs/apk/debug/*.apk
                      wear/build/outputs/apk/debug/*.apk
                  retention-days: 7
