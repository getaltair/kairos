name: Release Android

on:
    push:
        tags:
            - "v*"

# Required GitHub secrets:
#   GOOGLE_SERVICES_JSON  - full contents of app/google-services.json
#   KEYSTORE_BASE64       - base64-encoded .jks keystore file
#                           Generate: base64 -w 0 release.jks
#   KEYSTORE_PASSWORD     - keystore password
#   KEY_ALIAS             - key alias in the keystore
#   KEY_PASSWORD          - key password
#   GRADLE_ENCRYPTION_KEY - optional, for Gradle cache encryption

jobs:
    build-release:
        name: Build Signed APKs + AAB
        runs-on: ubuntu-latest
        env:
            GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21
            - uses: gradle/actions/setup-gradle@v4
              with:
                  cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
            - name: Write google-services.json
              if: env.GOOGLE_SERVICES_JSON != ''
              run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
            - name: Build signed phone AAB + APK
              env:
                  KAIROS_KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
                  KAIROS_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
                  KAIROS_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
                  KAIROS_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
              run: ./gradlew :app:bundleRelease :app:assembleRelease
            - name: Build signed Wear APK
              env:
                  KAIROS_KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
                  KAIROS_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
                  KAIROS_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
                  KAIROS_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
              run: ./gradlew :wear:assembleRelease
            - name: Upload release artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: release-artifacts
                  path: |
                      app/build/outputs/bundle/release/*.aab
                      app/build/outputs/apk/release/*.apk
                      wear/build/outputs/apk/release/*.apk

    create-release:
        name: Create GitHub Release
        runs-on: ubuntu-latest
        needs: build-release
        permissions:
            contents: write
        steps:
            - uses: actions/download-artifact@v4
              with:
                  name: release-artifacts
                  path: artifacts/
            - uses: softprops/action-gh-release@v2
              with:
                  files: artifacts/**
                  generate_release_notes: true
