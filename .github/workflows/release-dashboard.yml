name: Release Dashboard

on:
    push:
        tags:
            - "v*"

jobs:
    build-dashboard-deb:
        name: Build Dashboard .deb
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21
            - uses: gradle/actions/setup-gradle@v4
              with:
                  cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
            - name: Build dashboard uber JAR
              run: ./gradlew :dashboard:packageUberJarForCurrentOS
            - name: Install fpm
              run: gem install fpm
            - name: Package .deb
              env:
                  TAG_NAME: ${{ github.ref_name }}
              run: |
                  VERSION="${TAG_NAME#v}"
                  JAR_PATH=$(find dashboard/build/compose/jars -name "*.jar" | head -1)
                  fpm -s dir -t deb \
                    -n kairos-dashboard \
                    -v "$VERSION" \
                    --architecture all \
                    --description "Kairos habit tracker dashboard for Raspberry Pi" \
                    --depends "default-jre-headless | openjdk-21-jre-headless" \
                    --after-install deploy/postinst.sh \
                    --config-files /opt/kairos/dashboard.properties \
                    "$JAR_PATH=/opt/kairos/dashboard.jar" \
                    deploy/kairos-dashboard.service=/etc/systemd/system/kairos-dashboard.service \
                    deploy/dashboard.properties.default=/opt/kairos/dashboard.properties
            - name: Upload .deb artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dashboard-deb
                  path: "*.deb"
            - name: Upload uber JAR artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dashboard-jar
                  path: dashboard/build/compose/jars/*.jar

    attach-to-release:
        name: Attach to GitHub Release
        runs-on: ubuntu-latest
        needs: build-dashboard-deb
        permissions:
            contents: write
        steps:
            - uses: actions/download-artifact@v4
              with:
                  name: dashboard-deb
                  path: deb/
            - uses: actions/download-artifact@v4
              with:
                  name: dashboard-jar
                  path: jar/
            - uses: softprops/action-gh-release@v2
              with:
                  files: |
                      deb/*.deb
                      jar/*.jar
                  generate_release_notes: false
